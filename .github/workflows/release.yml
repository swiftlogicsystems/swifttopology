name: Release Static Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    # We use a specialized container that has all musl + libelf + zlib headers
    container: messense/rust-musl-cross:x86_64-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          # The container already has the cross-compiler, but we need clang for eBPF
          apt-get update && apt-get install -y clang llvm libelf-dev zlib1g-dev pkg-config

      - name: Build Static Binary
        run: |
          # Tell the linker where the static libelf and libz are located in this container
          export LIBS=" -lelf -lz "
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare Binary for Release
        run: |
          cp target/x86_64-unknown-linux-musl/release/swift-topomap ./swift-topomap
          # Verify the binary is truly static
          file ./swift-topomap

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: swift-topomap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
