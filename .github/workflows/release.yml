name: Release Static Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm \
            libelf-dev zlib1g-dev \
            build-essential pkg-config make

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Static Binary
        # We set the flag ONLY for the specific x86_64 target.
        # This prevents the proc-macro/clap error.
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release

      - name: Prepare Binary for Release
        run: |
          cp target/release/swift-topomap ./swift-topomap
          # Double check it is static. If 'ldd' says 'not a dynamic executable', we won!
          ldd ./swift-topomap || echo "Static Verification Passed"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: swift-topomap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
