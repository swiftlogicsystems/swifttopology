name: Release Static Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev zlib1g-dev build-essential pkg-config musl-tools linux-libc-dev

      - name: Install Rust musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build Static Binary
        # We set CPATH to tell the vendored C code where to find the 'asm/unistd.h'
        # on the Ubuntu runner while building for musl.
        run: |
          export CPATH=/usr/include/x86_64-linux-gnu
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare Binary for Release
        run: |
          cp target/x86_64-unknown-linux-musl/release/swift-topomap ./swift-topomap
          # Double check it is static
          file ./swift-topomap
          ldd ./swift-topomap || echo "Static Verification Passed"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: swift-topomap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
