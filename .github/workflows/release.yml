name: Release Static Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libelf-dev zlib1g-dev \
            build-essential pkg-config make

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Static Binary
        # cargo rustc applies these flags ONLY to the final binary
        # We manually link libelf and libz statically.
        run: |
          cargo rustc --release -- \
            -C target-feature=+crt-static \
            -C link-arg=-Wl,-Bstatic \
            -C link-arg=-lelf \
            -C link-arg=-lz \
            -C link-arg=-Wl,-Bdynamic

      - name: Prepare Binary for Release
        run: |
          cp target/release/swift-topomap ./swift-topomap
          file ./swift-topomap
          ldd ./swift-topomap || echo "Static Verification Passed"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: swift-topomap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
