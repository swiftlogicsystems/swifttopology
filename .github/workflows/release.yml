name: Release Static Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install Zig and cargo-zigbuild
        run: |
          sudo snap install zig --classic --edge
          cargo install cargo-zigbuild

      - name: Build Static Binary with Zig
        # zigbuild handles the musl headers and LFS (lseek64) issues automatically
        run: cargo zigbuild --release --target x86_64-unknown-linux-musl

      - name: Rename Binary
        run: cp target/x86_64-unknown-linux-musl/release/swift-topomap ./swift-topomap

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: swift-topomap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
