name: Release Static Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # Use 22.04 to avoid the GLIBC 2.38 (__isoc23) symbol leakage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make pkg-config autopoint gettext \
            binutils-dev libelf-dev zlib1g-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install cargo-zigbuild
        run: |
          python3 -m pip install cargo-zigbuild

      - name: Build Static Binary
        # zigbuild handles the mapping of lseek64 -> lseek and
        # ensures the C code uses musl-compatible headers.
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-musl

      - name: Prepare Binary for Release
        run: |
          cp target/x86_64-unknown-linux-musl/release/swift-topomap ./swift-topomap
          # Verify the binary is truly static
          file ./swift-topomap
          ! ldd ./swift-topomap || echo "Static Verification Passed"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: swift-topomap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
