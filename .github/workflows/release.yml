name: Release Static Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm \
            libelf-dev zlib1g-dev \
            build-essential pkg-config make

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Static Binary
        # We use RUSTFLAGS to tell the compiler to bundle everything (crt-static)
        # We use the standard gnu target because it's more stable for eBPF C-compilation
        run: |
          export RUSTFLAGS="-C target-feature=+crt-static"
          cargo build --release

      - name: Prepare Binary for Release
        run: |
          cp target/release/swift-topomap ./swift-topomap
          # Verify it's truly static (should say 'not a dynamic executable')
          ldd ./swift-topomap || echo "Static Verification Passed"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: swift-topomap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
