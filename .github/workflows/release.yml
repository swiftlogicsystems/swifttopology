name: Release Static Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libelf-dev zlib1g-dev \
            build-essential pkg-config musl-tools \
            linux-libc-dev \
            autopoint gettext libtool autoconf automake make

      - name: Install Rust musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build Static Binary
        # CPATH: Helps the musl compiler find kernel headers on a gnu-based runner
        # CC: Forces clang to ensure eBPF code compiles correctly
        run: |
          export CPATH=/usr/include/x86_64-linux-gnu
          export CC=clang
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare Binary for Release
        run: |
          cp target/x86_64-unknown-linux-musl/release/swift-topomap ./swift-topomap
          file ./swift-topomap
          ldd ./swift-topomap || echo "Static Verification Passed"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: swift-topomap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
