name: Release Static Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # Use 20.04 for maximum compatibility with older glibc systems
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libelf-dev zlib1g-dev \
            build-essential pkg-config make

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Static Binary
        # 'cargo rustc' applies the static flag ONLY to the final binary,
        # avoiding the proc-macro/clap error.
        # We also manually tell the linker to prefer static versions of elf and z.
        run: |
          cargo rustc --release -- \
            -C target-feature=+crt-static \
            -C link-arg=-Wl,-Bstatic \
            -C link-arg=-lelf \
            -C link-arg=-lz \
            -C link-arg=-Wl,-Bdynamic

      - name: Prepare Binary for Release
        run: |
          cp target/release/swift-topomap ./swift-topomap
          # Verify it's truly static
          file ./swift-topomap
          ldd ./swift-topomap || echo "Static Verification Passed"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: swift-topomap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
