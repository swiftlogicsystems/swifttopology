[package]
name = "swift-topomap"
version = "0.1.0"
edition = "2021"
authors = ["Ankur Rathore <ankur@swiftlogic.systems>"]
license = "MIT OR Apache-2.0"

[dependencies]
# TUI Stack
ratatui = { version = "0.26", features = ["crossterm"] }
crossterm = "0.27"

# System & Logic
anyhow = "1.0"
libc = "0.2"
serde = { version = "1.0", features = ["derive"] }
# We will add libbpf-rs in Phase 2

[build-dependencies]
# Reserved for eBPF skeleton generation later
