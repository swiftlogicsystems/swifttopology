name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev libhwloc-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Binary
        run: cargo build --release

      - name: Package Binary
        run: |
          cd target/release
          tar -czvf swift-topomap-linux-x64.tar.gz swift-topomap

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/swift-topomap-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
